<div class="overlay" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ isEditing() ? 'Editar Bus' : 'Nuevo Bus' }}</h2>
      <button class="close-btn" (click)="close()">&times;</button>
    </div>

    <form (ngSubmit)="onSubmit()" class="modal-body">
      <div class="grid">
        <div class="field">
          <label>Placa *</label>
          <input type="text" [(ngModel)]="form.placa" name="placa" required />
        </div>
        <div class="field">
          <label>Nombre *</label>
          <input type="text" [(ngModel)]="form.nombre" name="nombre" required />
        </div>
        <div class="field">
          <label>Marca</label>
          <input type="text" [(ngModel)]="form.marca" name="marca" />
        </div>
        <div class="field">
          <label>Modelo</label>
          <input type="text" [(ngModel)]="form.modelo" name="modelo" />
        </div>
        <div class="field">
          <label>Año</label>
          <input type="number" [(ngModel)]="form.anio" name="anio" />
        </div>
        <div class="field">
          <label>Tipo</label>
          <select [(ngModel)]="form.tipo" name="tipo">
            @for (t of tipos; track t) {
              <option [value]="t">{{ t }}</option>
            }
          </select>
        </div>
        <div class="field">
          <label>Capacidad</label>
          <input type="number" [(ngModel)]="form.capacidad" name="capacidad" />
        </div>
        <div class="field">
          <label>Precio</label>
          <input type="number" step="0.01" [(ngModel)]="form.precio" name="precio" />
        </div>
        <div class="field">
          <label>Peso (ton)</label>
          <input type="number" step="0.01" [(ngModel)]="form.peso" name="peso" />
        </div>
        <div class="field">
          <label>Color</label>
          <input type="text" [(ngModel)]="form.color" name="color" />
        </div>
        <div class="field">
          <label>Fecha compra *</label>
          <input type="date" [(ngModel)]="form.fecha_compra" name="fecha_compra" required />
        </div>
        <div class="field">
          <label>Último mantenimiento</label>
          <input type="date" [ngModel]="form.ultimo_mantenimiento ?? ''" (ngModelChange)="form.ultimo_mantenimiento = $event || null" name="ultimo_mantenimiento" />
        </div>
        <div class="field field--full">
          <label>Descripción</label>
          <textarea [(ngModel)]="form.descripcion" name="descripcion" rows="3"></textarea>
        </div>
        <div class="field field--inline">
          <label>
            <input type="checkbox" [(ngModel)]="form.activo" name="activo" />
            Activo
          </label>
        </div>
      </div>

      @if (error()) {
        <div class="form-error">{{ error() }}</div>
      }

      <div class="modal-actions">
        <button type="button" class="btn btn--secondary" (click)="close()">Cancelar</button>
        <button type="submit" class="btn btn--primary" [disabled]="saving()">
          {{ saving() ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>
