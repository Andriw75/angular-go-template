<div class="modal" (click)="cancel()">
  <div class="modal-body" (click)="$event.stopPropagation()">
    <h3>{{ isEditing ? 'Editar Usuario' : 'Nuevo Usuario' }}</h3>

    <div class="form-group">
      <label>Usuario</label>
      <input class="form-input" type="text" [(ngModel)]="username" placeholder="Nombre de usuario" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input class="form-input" type="email" [(ngModel)]="email" placeholder="correo@ejemplo.com" />
    </div>

    <div class="form-group">
      <label>{{ isEditing ? 'Contraseña (dejar vacío para mantener)' : 'Contraseña' }}</label>
      <input class="form-input" type="password" [(ngModel)]="password" placeholder="••••••••" />
    </div>

    <div class="form-group">
      <label class="checkbox-label">
        <input type="checkbox" [(ngModel)]="activo" />
        Usuario activo
      </label>
    </div>

    <div class="form-group">
      <label>Permisos</label>
      @if (isSelf) {
        <p class="hint">No puedes modificar tus propios permisos</p>
      }
      <div class="permisos-grid">
        @for (p of permisosDisponibles(); track p.id) {
          <label class="checkbox-label" [class.disabled]="isSelf">
            <input
              type="checkbox"
              [checked]="selectedPermisos.includes(p.nombre)"
              [disabled]="isSelf"
              (change)="togglePermiso(p.nombre)"
            />
            <span class="permiso-name">{{ p.nombre }}</span>
            <span class="permiso-desc">{{ p.descripcion }}</span>
          </label>
        }
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn--secondary" (click)="cancel()">Cancelar</button>
      <button class="btn btn--primary" (click)="save()" [disabled]="saving()">
        {{ saving() ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>
  </div>
</div>
